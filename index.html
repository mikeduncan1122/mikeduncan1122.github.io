<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}
<script>
const songs = [
    {
        title: "drama queen - jaydes",
        file: "dramaqueen.mp3"
    },
    {
        title: "Take Me Home - PinkPantheress",
        file: "takemehome.mp3"
    },
    {
        title: "HONEST - Baby Keem",
        file: "honest.mp3"
    }
];

let currentSong = 0;

const player = document.getElementById("player");
const seekbar = document.getElementById("seekbar");
const songTitle = document.getElementById("songTitle");

function loadSong(index){
    currentSong = index;

    player.src = songs[index].file;
    songTitle.textContent = songs[index].title;

    player.load();
}

function togglePlay(){
    if(player.paused){
        player.play();
    }else{
        player.pause();
    }
}

function nextSong(){
    currentSong++;

    if(currentSong >= songs.length){
        currentSong = 0;
    }

    loadSong(currentSong);
    player.play();
}

function previousSong(){
    currentSong--;

    if(currentSong < 0){
        currentSong = songs.length - 1;
    }

    loadSong(currentSong);
    player.play();
}

player.addEventListener("ended", nextSong);

player.addEventListener("timeupdate", () => {
    seekbar.value =
        (player.currentTime / player.duration) * 100 || 0;
});

seekbar.addEventListener("input", () => {
    player.currentTime =
        (seekbar.value / 100) * player.duration;
});

loadSong(0);
</script>
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%, rgba(90,0,120,.4), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(60,0,100,.4), transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(120,0,180,.25), transparent 50%);
    animation: gradientMove 20s ease-in-out infinite alternate;
    z-index:-1;
}

@keyframes gradientMove{
    0%{
        transform:scale(1) translate(-50px,-30px);
    }
    100%{

}
