<script>

let vx=0,vy=0,drag=false,ox=0,oy=0,lastX=0,lastY=0;
function draw(){
 win.style.left=x+'px'; win.style.top=y+'px'; win.style.transform=`rotate(${Math.max(-8,Math.min(8,vx*0.15))}deg)`;
}
win.style.position='absolute';draw();
function start(e){
 drag=true;const p=e.touches?e.touches[0]:e;
 ox=p.clientX-x;oy=p.clientY-y;lastX=p.clientX;lastY=p.clientY;vx=vy=0;
}
function move(e){
 if(!drag)return;
 const p=e.touches?e.touches[0]:e;
 x=p.clientX-ox;y=p.clientY-oy;
 vx=p.clientX-lastX;vy=p.clientY-lastY;
 lastX=p.clientX;lastY=p.clientY;
 draw(); if(e.cancelable)e.preventDefault();
}
function stop(){drag=false;}
win.addEventListener('mousedown',start);
document.addEventListener('mousemove',move);
document.addEventListener('mouseup',stop);
win.addEventListener('touchstart',start,{passive:false});
document.addEventListener('touchmove',move,{passive:false});
document.addEventListener('touchend',stop);
(function anim(){
 if(!drag){
   x+=vx;y+=vy;
   vx*=0.992;vy*=0.992;
   const loss=.88;
   if(x<0){x=0;vx=-vx*loss;}
   if(y<0){y=0;vy=-vy*loss;}
   if(x>innerWidth-win.offsetWidth){x=innerWidth-win.offsetWidth;vx=-vx*loss;}
   if(y>innerHeight-win.offsetHeight){y=innerHeight-win.offsetHeight;vy=-vy*loss;}
   draw();
 }
 requestAnimationFrame(anim);
})();

const GRAVITY = 0.4;
const BOUNCE = 0.65;
const FRICTION = 0.99;
const COLLISION_DAMP = 0.7;

function randomFrom(arr){
    return arr[Math.floor(Math.random() * arr.length)];
}

function getMusicRect(){
    const el = document.getElementById("music");
    if(!el)return null;
    const r = el.getBoundingClientRect();
    return { x: r.left, y: r.top, w: r.width, h: r.height };
}

function physicsUpdate(){
    const music = getMusicRect();

    for(let i = 0; i < particles.length; i++){
        const p = particles[i];
        if(p.drag) continue;
        p.vy += GRAVITY;
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= FRICTION;

        if(p.x < 0){ p.x = 0; p.vx = -p.vx * BOUNCE; }
        if(p.y < 0){ p.y = 0; p.vy = -p.vy * BOUNCE; }
        if(p.x + p.size > innerWidth){ p.x = innerWidth - p.size; p.vx = -p.vx * BOUNCE; }
        if(p.y + p.size > innerHeight){ p.y = innerHeight - p.size; p.vy = -p.vy * BOUNCE; }

        if(music){
            const cx = p.x + p.size/2, cy = p.y + p.size/2;
            const closestX = Math.max(music.x, Math.min(cx, music.x + music.w));
            const closestY = Math.max(music.y, Math.min(cy, music.y + music.h));
            const dx = cx - closestX;
            const dy = cy - closestY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const minDist = p.size / 2;

            if(dist < minDist){
                const overlap = minDist - dist;
                if(dist > 0){
                    const nx = dx / dist;
                    const ny = dy / dist;
                    p.x += nx * overlap;
                    p.y += ny * overlap;
                    const relVn = p.vx * nx + p.vy * ny;
                    if(relVn < 0){
                        p.vx -= relVn * nx * 1.2;
                        p.vy -= relVn * ny * 1.2;
                    }
                } else {
                    p.y -= overlap;
                    if(p.vy > 0) p.vy = -p.vy * BOUNCE;
                }
            }
        }

        p.el.style.left = p.x + "px";
        p.el.style.top = p.y + "px";
    }

    for(let i = 0; i < particles.length; i++){
        for(let j = i + 1; j < particles.length; j++){
            const a = particles[i], b = particles[j];
            if(a.drag || b.drag) continue;
            const dx = (a.x + a.size/2) - (b.x + b.size/2);
            const dy = (a.y + a.size/2) - (b.y + b.size/2);
            const dist = Math.sqrt(dx*dx + dy*dy);
            const minDist = (a.size + b.size) / 2;

            if(dist < minDist && dist > 0){
                const overlap = minDist - dist;
                const nx = dx / dist;
                const ny = dy / dist;

                const totalMass = a.mass + b.mass;
                const ratioA = b.mass / totalMass;
                const ratioB = a.mass / totalMass;

                a.x += nx * overlap * ratioA;
                a.y += ny * overlap * ratioA;
                b.x -= nx * overlap * ratioB;
                b.y -= ny * overlap * ratioB;

                const relVx = a.vx - b.vx;
                const relVy = a.vy - b.vy;
                const relVn = relVx * nx + relVy * ny;

                if(relVn < 0){
                    const impulse = -(1 + COLLISION_DAMP) * relVn / (1/a.mass + 1/b.mass);
                    a.vx += (impulse / a.mass) * nx;
                    a.vy += (impulse / a.mass) * ny;
                    b.vx -= (impulse / b.mass) * nx;
                    b.vy -= (impulse / b.mass) * ny;
                }
            }
        }
    }
}

function spawnPhysicsImage(imageList){
    const img = document.createElement("img");
    img.className = "falling-img";
    img.src = GITHUB_BASE + randomFrom(imageList);
    img.draggable = false;

    img.style.width = "auto";
    img.style.height = "auto";
    img.style.maxWidth = "200px";
    img.style.maxHeight = "200px";

    const x = Math.random() * (innerWidth - 100);
    const y = -100 - Math.random() * 200;

    img.style.left = x + "px";
    img.style.top = y + "px";

    physicsLayer.appendChild(img);

    const pObj = {
        el: img,
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 4,
        vy: 0,
        size: 100,
        mass: 100,
        group: "pictures",
        drag: false,
        ox: 0,
        oy: 0
    };

    img.onload = () => {
        const scale = Math.min(200 / img.naturalWidth, 200 / img.naturalHeight, 1);
        const w = Math.round(img.naturalWidth * scale);
        const h = Math.round(img.naturalHeight * scale);
        img.style.width = w + "px";
        img.style.height = h + "px";
        pObj.size = Math.max(w, h);
        pObj.mass = pObj.size;
    };

    particles.push(pObj);

    img.addEventListener("mousedown", (e) => {
        pObj.drag = true;
        pObj.ox = e.clientX - pObj.x;
        pObj.oy = e.clientY - pObj.y;
        pObj.lx = e.clientX;
        pObj.ly = e.clientY;
        e.stopPropagation();
    });

    img.addEventListener("touchstart", (e) => {
        const t = e.touches[0];
        pObj.drag = true;
        pObj.ox = t.clientX - pObj.x;
        pObj.oy = t.clientY - pObj.y;
        pObj.lx = t.clientX;
        pObj.ly = t.clientY;
        e.stopPropagation();
    }, {passive: false});
}

document.addEventListener("mousemove", (e) => {
    for(const p of particles){
        if(p.drag){
            p.vx = e.clientX - p.lx;
            p.vy = e.clientY - p.ly;
            p.x = e.clientX - p.ox;
            p.y = e.clientY - p.oy;
            p.lx = e.clientX;
            p.ly = e.clientY;
            p.el.style.left = p.x + "px";
            p.el.style.top = p.y + "px";
        }
    }
});

document.addEventListener("touchmove", (e) => {
    const t = e.touches[0];

            p.x = t.clientX - p.ox;

            p.ly = t.clientY;
            p.el.style.left = p.x + "px";
            p.el.style.top = p.y + "px";

document.addEventListener("mouseup", () => {

document.addEventListener("touchend", () => {

document.getElementById("pictureBtn").addEventListener("click", () => {

document.getElementById("clearBtn").addEventListener("click", () => {

(function physicsLoop(){
    physicsUpdate();
