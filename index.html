<!DOCTYPE html>
<html lang="en">
<head>
<meta property="og:title" content="florida" />
<meta property="og:description" content="my such cool site i really like this site because its mine!" />
<meta property="og:url" content="https://youenvy.me" />
<meta property="og:type" content="website" />
<meta name="theme-color" content="#ffb6c1" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sinneds bio type shit</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    background:#000;
}


body::before{
    content:"";
    position:fixed;
    inset:0;
    background-size:cover;
    background-position:center;
    filter:blur(60px) brightness(0.4);
    transform:scale(1.2);
    transition:1s ease;
    z-index:-2;
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%, rgba(90,0,120,.4), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(60,0,100,.4), transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(120,0,180,.25), transparent 50%);
    animation: gradientMove 20s ease-in-out infinite alternate;
    z-index:-1;
}

@keyframes gradientMove{
    0%{transform:scale(1) translate(-50px,-30px);}
    100%{transform:scale(1.2) translate(50px,30px);}
}


.music-player{
    position:fixed;
    bottom:20px;
    left:20px;
    width:260px;
    padding:16px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:20px;
    color:white;
}

.music-controls{
    display:flex;
    justify-content:space-between;
}

.music-controls button{
    flex:1;
    margin:0 4px;
    padding:8px;
    background:rgba(120,0,180,.2);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:12px;
    color:white;
    cursor:pointer;
}


.progress-container{
    width:100%;
    height:6px;
    background:rgba(255,255,255,0.1);
    border-radius:10px;
    margin-top:10px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:rgba(180,0,255,0.7);
}


.volume{
    width:100%;
    margin-top:10px;
}


.playlist{
    position:fixed;
    top:0;
    right:-260px;
    width:260px;
    height:100%;
    background:rgba(20,0,30,0.85);
    backdrop-filter:blur(15px);
    border-left:1px solid rgba(255,255,255,0.1);
    transition:0.4s ease;
    padding:20px;
    color:white;
}

.playlist.open{
    right:0;
}

.playlist h3{
    margin-bottom:10px;
}

.song{
    padding:10px;
    margin:6px 0;
    background:rgba(255,255,255,0.08);
    border-radius:10px;
    cursor:pointer;
}

.song:hover{
    background:rgba(160,0,220,0.25);
}


.playlist-toggle{
    position:fixed;
    top:20px;
    right:20px;
    padding:10px;
    background:rgba(120,0,180,.3);
    border:1px solid rgba(255,255,255,0.2);
    color:white;
    border-radius:10px;
    cursor:pointer;
}


.container{
    width:450px;
    padding:35px;
    text-align:center;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:25px;
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    cursor:grab;
}
</style>
</head>

<body>

<button class="playlist-toggle" onclick="togglePlaylist()">playlist</button>

<div class="playlist" id="playlistBox">
    <h3>cool songs</h3>
    <div id="songList"></div>
</div>

<div class="music-player">
    <div class="music-header">
        <span>now playing:</span>
        <span id="trackName">none</span>
    </div>

    <div class="music-controls">
        <button id="prevBtn">⏮</button>
        <button id="playBtn">⏯</button>
        <button id="nextBtn">⏭</button>
    </div>

    <audio id="audio"></audio>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

   
    <input class="volume" id="volume" type="range" min="0" max="1" step="0.01">

</div>

<div class="container" id="window">
    <h1>2manysins</h1>
    <p class="description">hi hello im sinned...</p>
</div>

<script>
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const nextBtn = document.getElementById("nextBtn");
const prevBtn = document.getElementById("prevBtn");
const trackName = document.getElementById("trackName");
const progressBar = document.getElementById("progressBar");
const volume = document.getElementById("volume");

const playlist = [
    {file:"honest.mp3", cover:"cover1.jpg"},
    {file:"dramaqueen.mp3", cover:"cover2.jpg"},
    {file:"takemehome.mp3", cover:"cover3.jpg"}
];

let current = 0;
let isPlaying = false;

function setBackground(img){
    document.body.style.setProperty('--bg', img);
    document.body.style.setProperty('background-image', `url(${img})`);
    document.body.style.backgroundImage = `url(${img})`;
    document.body.style.setProperty('background-size','cover');
}

function loadSong(i){
    const song = playlist[i];
    audio.src = song.file;
    trackName.textContent = song.file.replace(".mp3","");
    setBackground(song.cover);

    if(isPlaying) audio.play();
}

function playSong(){ isPlaying=true; audio.play(); }
function pauseSong(){ isPlaying=false; audio.pause(); }

playBtn.onclick=()=>{
    audio.paused ? playSong() : pauseSong();
};

nextBtn.onclick=()=>{
    current=(current+1)%playlist.length;
    loadSong(current);
    playSong();
};

prevBtn.onclick=()=>{
    current=(current-1+playlist.length)%playlist.length;
    loadSong(current);
    playSong();
};


volume.oninput=()=> audio.volume = volume.value;


audio.ontimeupdate=()=>{
    progressBar.style.width =
        (audio.currentTime/audio.duration)*100+"%";
};


function togglePlaylist(){
    document.getElementById("playlistBox").classList.toggle("open");
}


const songList=document.getElementById("songList");

playlist.forEach((s,i)=>{
    const div=document.createElement("div");
    div.className="song";
    div.innerText=s.file.replace(".mp3","");
    div.onclick=()=>{
        current=i;
        loadSong(i);
        playSong();
    };
    songList.appendChild(div);
});

loadSong(current);
</script>

</body>
</html>
