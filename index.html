<script>
const win=document.getElementById('window');
let x=(window.innerWidth-win.offsetWidth)/2,y=(window.innerHeight-win.offsetHeight)/2;
let vx=0,vy=0,drag=false,ox=0,oy=0,lastX=0,lastY=0;
function draw(){
 win.style.left=x+'px'; win.style.top=y+'px'; win.style.transform=`rotate(${Math.max(-8,Math.min(8,vx*0.15))}deg)`;
}
win.style.position='absolute';draw();
function start(e){
 drag=true;const p=e.touches?e.touches[0]:e;
 ox=p.clientX-x;oy=p.clientY-y;lastX=p.clientX;lastY=p.clientY;vx=vy=0;
}
function move(e){
 if(!drag)return;
 const p=e.touches?e.touches[0]:e;
 x=p.clientX-ox;y=p.clientY-oy;
 vx=p.clientX-lastX;vy=p.clientY-lastY;
 lastX=p.clientX;lastY=p.clientY;
 draw(); if(e.cancelable)e.preventDefault();
}
function stop(){drag=false;}
win.addEventListener('mousedown',start);
document.addEventListener('mousemove',move);
document.addEventListener('mouseup',stop);
win.addEventListener('touchstart',start,{passive:false});
document.addEventListener('touchmove',move,{passive:false});
document.addEventListener('touchend',stop);
(function anim(){
 if(!drag){
   x+=vx;y+=vy;
   vx*=0.992;vy*=0.992;
   const loss=.88;
   if(x<0){x=0;vx=-vx*loss;}
   if(y<0){y=0;vy=-vy*loss;}
   if(x>innerWidth-win.offsetWidth){x=innerWidth-win.offsetWidth;vx=-vx*loss;}
   if(y>innerHeight-win.offsetHeight){y=innerHeight-win.offsetHeight;vy=-vy*loss;}
   draw();
 }
 requestAnimationFrame(anim);
})();
addEventListener('resize',()=>{x=Math.min(x,innerWidth-win.offsetWidth);y=Math.min(y,innerHeight-win.offsetHeight);draw();});


const playBtn = document.getElementById("playBtn");
const nextBtn = document.getElementById("nextBtn");
const prevBtn = document.getElementById("prevBtn");
const trackName = document.getElementById("trackName");
const audio = document.getElementById("audio");
const progressBar = document.getElementById("progressBar");
const currentTimeEl = document.getElementById("currentTime");
const durationEl = document.getElementById("duration");

// this is the playlist dont like put mp4s
const playlist = [
    "honest.mp3",
    "dramaqueen.mp3",
    "takemehome.mp3",
    "deathofskitz.mp3",
    "lovemakesmenauseous.mp3",
    "puking.mp3",
    "natural.mp3",
    "reputation.mp3",
    "perfection.mp3",
    "deadmeat.mp3",
    "mixtapebeatsnippet013.mp3"
    
    
];

let current = 0;
let isPlaying = false;

function loadSong(index){
    const src = playlist[index];
    audio.src = src;

    
    trackName.textContent = src.split("/").pop().replace(".mp3", "");

    audio.loop = true;
    audio.volume = 0.15; 

    if(isPlaying){
        audio.play();
    }
}

function playSong(){
    isPlaying = true;
    audio.play();
}

function pauseSong(){
    isPlaying = false;
    audio.pause();
}

playBtn.onclick = () => {
    if(audio.paused){
        playSong();
    } else {
        pauseSong();
    }
};

nextBtn.onclick = () => {
    current = (current + 1) % playlist.length;
    loadSong(current);
    playSong();
};

prevBtn.onclick = () => {
    current = (current - 1 + playlist.length) % playlist.length;
    loadSong(current);
    playSong();
};


audio.onended = () => {
    nextBtn.click();
};
function formatTime(sec){
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return `${m}:${s < 10 ? "0" + s : s}`;
}


audio.addEventListener("loadedmetadata", () => {
    durationEl.textContent = formatTime(audio.duration);
});


audio.addEventListener("timeupdate", () => {
    const percent = (audio.currentTime / audio.duration) * 100;
    progressBar.style.width = percent + "%";

    currentTimeEl.textContent = formatTime(audio.currentTime);
});
  document.querySelector(".progress-container").addEventListener("click", (e) => {
    const rect = e.target.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    const width = rect.width;

    audio.currentTime = (clickX / width) * audio.duration;
});

loadSong(current);
</script>
