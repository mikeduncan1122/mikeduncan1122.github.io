<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>blank</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #333;
      line-height: 1.6;
    }

    header {
      background: #222;
      color: white;
      padding: 2rem 1rem;
      text-align: center;
    }

    header h1 {
      font-size: 2.5rem;
    }

    header p {
      margin-top: 0.5rem;
      color: #ccc;
    }

    nav {
      background: #333;
      padding: 1rem;
      text-align: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    nav a:hover {
      color: #00bcd4;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 2rem;
    }

    section {
      margin-bottom: 3rem;
    }

    h2 {
      margin-bottom: 1rem;
      color: #222;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
    }

    .project-card {
      background: white;
      padding: 1rem;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .project-card h3 {
      margin-bottom: 0.5rem;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      background: #222;
      color: white;
    }

    .btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 10px 20px;
      background: #00bcd4;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .btn:hover {
      background: #0097a7;
    }
  </style>
</head>
<body>

  <header>
    <h1>Your Name</h1>
    <p>Web Developer | Designer | Creator</p>
  </header>

  <nav>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>

  <div class="container">

    <section id="about">
      <h2>About Me</h2>
      <p>
        hi im good
      </p>
    </section>

    <section id="projects">
      <h2>Projects</h2>

      <div class="projects">

        <div class="project-card">
          <h3>super</h3>
          <p>i like cat</p>
          <a href="#" class="btn">ding</a>
        </div>

        <div class="project-card">
          <h3>bynbe</h3>
          <p>oh fiddlesticks</p>
          <a href="#" class="btn">Hi</a>
        </div>

        <div class="project-card">
          <h3>Yeah</h3>
          <p>cats</p>
          <a href="#" class="btn">14</a>
        </div>

      </div>
    </section>

    <section id="contact">
      <h2>Cont</h2>
      <p>h/p>
      <p>h</p>
      <p>g/p>
    </section>

  </div>

  <footer>
    <p>hate.</p>
  </footer>

</body>
</html>
