<title>sinneds bio type shit</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:#000;
}


body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%, rgba(90,0,120,.4), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(60,0,100,.4), transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(120,0,180,.25), transparent 50%);
    animation: gradientMove 20s ease-in-out infinite alternate;
    z-index:-1;
}

@keyframes gradientMove{
    0%{
        transform:scale(1) translate(-50px,-30px);
    }
    100%{
        transform:scale(1.2) translate(50px,30px);
    }
}


.container{
    width:450px;
    padding:35px;
    text-align:center;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.15);
    border-radius:25px;

    box-shadow:
        0 0 40px rgba(100,0,180,.25),
        inset 0 0 20px rgba(255,255,255,.03);
}


.profile{
    width:120px;
    height:120px;
    margin:0 auto 20px;

    border-radius:50%;
    overflow:hidden;

    border:2px solid rgba(255,255,255,.2);
    background:rgba(255,255,255,.05);
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
}


h1{
    color:white;
    margin-bottom:10px;
    font-size:2rem;
}


.description{
    color:rgba(255,255,255,.75);
    margin-bottom:25px;
    line-height:1.5;
}


.buttons{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.btn{
    display:block;
    text-decoration:none;

    padding:14px;
    border-radius:15px;

    color:white;
    background:rgba(120,0,180,.25);

    border:1px solid rgba(255,255,255,.1);

    transition:.25s;
}

.btn:hover{
    background:rgba(140,0,220,.4);
    transform:translateY(-2px);
}
</style>
</head>
